<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW Landing Page</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
}

/* Split Background */
.hero{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
}

/* Left Side */
.left{
    width:50%;
    background:#e9e9e9;
}

/* Right Side */
.right{
    width:50%;
    background:linear-gradient(to right, #0f2027, #203a43, #0f2027);
}

/* Navbar */
nav{
    position:absolute;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:30px 80px;
    z-index:5;
}

.logo{
    font-size:28px;
    font-weight:800;
    letter-spacing:2px;
}

.menu-left a,
.menu-right a{
    text-decoration:none;
    margin:0 20px;
    font-size:16px;
    color:#000;
}

.menu-right a{
    color:#fff;
}

/* 🔥 Big BMW Background Text */
.big-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:320px;
    font-weight:900;              /* Extra Bold */
    letter-spacing:25px;
    color:rgba(0,0,0,0.20);       /* More visible */
    z-index:1;
    user-select:none;
}

.right .big-text{
    color:rgba(255,255,255,0.20); /* More visible on dark */
}

/* 🔵 Blue Car */
.car{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:850px;
    z-index:3;

    /* Blue color effect */
    filter: hue-rotate(200deg) saturate(160%) brightness(95%);
    transition:0.5s ease;
}

/* Slight hover effect */
.car:hover{
    transform:translate(-50%,-50%) scale(1.03);
}

/* Center Content */
.center-content{
    position:absolute;
    bottom:120px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    z-index:5;
}

.center-content p{
    font-size:20px;
    margin-bottom:20px;
}

.center-content button{
    padding:15px 40px;
    font-size:16px;
    border:none;
    background:#fff;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.center-content button:hover{
    background:#000;
    color:#fff;
}

/* Side Buttons */
.catalog{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%) rotate(-90deg);
    border:1px solid #000;
    padding:10px 25px;
    font-size:14px;
}

.print{
    position:absolute;
    right:20px;
    top:50%;
    transform:translateY(-50%) rotate(90deg);
    border:1px solid #fff;
    padding:10px 25px;
    font-size:14px;
    color:#fff;
}

/* Footer */
.footer{
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 80px;
    font-size:14px;
}

.footer-left{
    color:#000;
}

.footer-right{
    color:#fff;
}

.footer-right a{
    margin-left:20px;
    text-decoration:none;
    color:#fff;
}

</style>
</head>
<body>

<div class="hero">

    <div class="left"></div>
    <div class="right"></div>

    <!-- Navbar -->
    <nav>
        <div class="logo">BMW</div>

        <div class="menu-left">
            <a href="#">Store</a>
            <a href="#">Shop</a>
            <a href="#">Collection</a>
        </div>

        <div class="menu-right">
            <a href="#">Cart</a>
            <a href="#">Login/Register</a>
            <a href="#">Profile</a>
        </div>
    </nav>

    <!-- Big Background Text -->
    <div class="big-text">BMW</div>

    <!-- Car Image -->
    <img src="https://pngimg.com/uploads/bmw/bmw_PNG1711.png" class="car">

    <!-- Side Buttons -->
    <div class="catalog">CATALOG</div>
    <div class="print">PRINT</div>

    <!-- Center Content -->
    <div class="center-content">
        <p>Tough &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Modern</p>
        <button>EXPLORE MORE</button>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-left">
            Copyright © 2024 Web Design Mastery. All rights reserved.
        </div>
        <div class="footer-right">
            <a href="#">Facebook</a>
            <a href="#">Instagram</a>
            <a href="#">Twitter</a>
        </div>
    </div>

</div>

</body>
</html>
